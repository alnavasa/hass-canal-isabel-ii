refresh:
  name: Refresh sensors
  description: >
    Re-process the local cache and refresh sensor attributes
    (consumption_today_l, etc.). Does NOT pull from the portal — for
    that, press the bookmarklet in your browser. Useful after a manual
    edit to ``<config>/.storage/canal_isabel_ii.<entry_id>`` or to
    force the time-derived attributes to recompute outside the
    hourly tick.
  fields:
    instance:
      name: Instance
      description: Free-text installation name OR config entry id of a specific integration. Leave empty to refresh all.
      example: Casa principal
      selector:
        text:

show_bookmarklet:
  name: Show bookmarklet
  description: >
    Re-display the bookmarklet code as a persistent notification.
    Use after losing the original install message.
  fields:
    instance:
      name: Instance
      description: Free-text installation name OR config entry id. Leave empty to show all.
      example: Casa principal
      selector:
        text:

clear_cost_stats:
  name: Clear cost statistics
  description: >
    Wipe ALL long-term cost statistics for the integration entry
    (both ``canal_isabel_ii:cost_<contract>`` and the entity-side
    ``sensor.<…>_coste_acumulado`` series). The next coordinator
    refresh rebuilds the full series from a clean slate via the
    spike-immune push. Use this if the Energy panel shows negative
    bars or wildly wrong totals for the cost entity — for example
    after upgrading from a pre-v0.5.4 install where HA's auto-stats
    collided with our explicit push, or any other corruption that
    survived the one-shot v0.5.4 migration.
  fields:
    instance:
      name: Instance
      description: Free-text installation name OR config entry id. Leave empty to clear all.
      example: Casa principal
      selector:
        text:

reset_meter:
  name: Reset meter
  description: >
    Tell the integration that the physical water meter has been
    replaced. Clears the per-contract trim baseline and the in-memory
    monotonic guard on the cumulative-consumption, cumulative-cost
    and absolute-meter-reading sensors so the next (lower) reading
    from the new counter is accepted as-is. Long-term statistics for
    the Energy panel are NOT touched — those continue forward from
    the recorder's last sum, so your historical totals stay intact.
  fields:
    instance:
      name: Instance
      description: Free-text installation name OR config entry id of a specific integration. Leave empty to reset every entry.
      example: Casa principal
      selector:
        text:
