name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip integration
        run: |
          cd custom_components/canal_isabel_ii
          zip -r ../../canal_isabel_ii.zip .
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: canal_isabel_ii.zip
          generate_release_notes: true
